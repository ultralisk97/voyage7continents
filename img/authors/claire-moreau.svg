<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgAv" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4c28a"/>
      <stop offset="100%" stop-color="#e67e22"/>
    </linearGradient>
    <clipPath id="circ"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>
  <g clip-path="url(#circ)">
    <rect width="200" height="200" fill="url(#bgAv)"/>
    <!-- hair back -->
    <path d="M40 115 Q40 55 100 50 Q160 55 160 115 L160 170 Q160 185 145 188 L145 150 Q130 158 100 158 Q70 158 55 150 L55 188 Q40 185 40 170 Z" fill="#3a2418"/>
    <!-- neck -->
    <rect x="85" y="130" width="30" height="35" rx="4" fill="#f2c7a8"/>
    <!-- face -->
    <ellipse cx="100" cy="105" rx="38" ry="44" fill="#f7d4b6"/>
    <!-- hair front / bangs -->
    <path d="M62 90 Q65 60 100 55 Q135 60 138 90 Q132 78 118 76 Q110 82 100 80 Q90 82 82 76 Q68 78 62 90 Z" fill="#3a2418"/>
    <!-- eyebrows -->
    <path d="M78 98 Q85 94 92 98" stroke="#3a2418" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M108 98 Q115 94 122 98" stroke="#3a2418" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- eyes -->
    <ellipse cx="85" cy="108" rx="3.2" ry="4" fill="#3a2418"/>
    <ellipse cx="115" cy="108" rx="3.2" ry="4" fill="#3a2418"/>
    <circle cx="86" cy="107" r="1" fill="#fff"/>
    <circle cx="116" cy="107" r="1" fill="#fff"/>
    <!-- nose -->
    <path d="M100 112 L96 125 Q100 128 104 125 Z" fill="none" stroke="#d4a888" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- mouth -->
    <path d="M90 138 Q100 144 110 138" stroke="#c0392b" stroke-width="2.8" fill="none" stroke-linecap="round"/>
    <!-- cheeks -->
    <circle cx="78" cy="122" r="4" fill="#f2a18a" opacity="0.55"/>
    <circle cx="122" cy="122" r="4" fill="#f2a18a" opacity="0.55"/>
    <!-- earrings -->
    <circle cx="63" cy="118" r="2.5" fill="#e67e22"/>
    <circle cx="137" cy="118" r="2.5" fill="#e67e22"/>
    <!-- shoulders / blouse -->
    <path d="M30 200 Q50 158 85 155 L115 155 Q150 158 170 200 Z" fill="#1a5276"/>
    <path d="M85 155 Q100 168 115 155 L115 175 Q100 180 85 175 Z" fill="#f7d4b6"/>
  </g>
  <circle cx="100" cy="100" r="99" fill="none" stroke="#ffffff" stroke-width="2"/>
</svg>
